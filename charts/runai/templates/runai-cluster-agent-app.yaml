{{- if .Values.agentCluster.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-cluster-agent
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ required "chartRepo.url is required (baked in by the release pipeline)" .Values.chartRepo.url | quote }}
    chart: runai-cluster-agent
    targetRevision: {{ .Values.chartRepo.runaiClusterAgentRevision | quote }}
    helm:
      releaseName: runai-cluster-agent
      values: |
        argocd:
          namespace: {{ .Values.argocd.namespace }}
        appName: {{ printf "%s-cluster-agent" .Release.Name | quote }}
        project: {{ .Values.project | quote }}
        destination:
          name: {{ .Values.destination.name | quote }}
        domain: {{ .Values.domain | quote }}
        runai:
          namespace: {{ .Values.runai.namespace | quote }}
          version: {{ .Values.runai.version | quote }}
        customCAName: {{ .Values.customCAName | quote }}
        selfSignedCA: {{ .Values.selfSignedCA }}
        caBundleName: {{ .Values.caBundleName | quote }}
  destination:
    name: {{ .Values.destination.name | quote }}
    namespace: {{ .Values.argocd.namespace | quote }}
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
