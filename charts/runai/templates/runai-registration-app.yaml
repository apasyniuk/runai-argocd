{{- if .Values.agentCluster.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-agent-registration
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ required "chartRepo.url is required (baked in by the release pipeline)" .Values.chartRepo.url | quote }}
    chart: runai-registration
    targetRevision: {{ .Values.chartRepo.runaiRegistrationRevision | quote }}
    helm:
      releaseName: {{ .Release.Name }}-agent-registration
      values: |
        cpURL: "https://{{ .Values.domain }}"
        adminUsername: {{ .Values.adminUsername | quote }}
        adminPassword: {{ .Values.adminPassword | quote }}
        clusterName: {{ .Values.agentCluster.name | default .Values.destination.name | quote }}
        clusterURL: "https://{{ .Values.domain }}"
        agentVersion: {{ .Values.runai.version | quote }}
        credentialsNamespace: {{ .Values.argocd.namespace | quote }}
        {{- if .Values.customCAName }}
        caSecretName: {{ .Values.customCAName | quote }}
        caKey: "runai-ca.pem"
        {{- else if .Values.selfSignedCA }}
        caSecretName: {{ .Values.caBundleName | quote }}
        caKey: "runai-ca.pem"
        {{- end }}
  destination:
    name: {{ .Values.destination.name | quote }}
    namespace: {{ .Values.argocd.namespace | quote }}
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
