{{- define "runai.certConfig.defaults" -}}
selfSignedCA: {{ .Values.selfSignedCA }}
customCAName: {{ .Values.customCAName | quote }}
registryToken: {{ .Values.registryToken | quote }}
certManager:
  namespace: {{ .Values.certManager.namespace | quote }}
runai:
  namespace: {{ .Values.runai.namespace | quote }}
{{- if or .Values.selfSignedCA .Values.customCAName }}
domain: {{ required "domain is required when selfSignedCA or customCAName is set" .Values.domain | quote }}
caBundleName: {{ .Values.caBundleName | quote }}
{{- end }}
{{- end }}

{{- if or .Values.selfSignedCA .Values.customCAName .Values.registryToken }}
{{- $defaults := fromYaml (include "runai.certConfig.defaults" .) }}
{{- $values := merge (.Values.certConfig.valuesOverride | default dict) $defaults }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-cert-config
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ required "chartRepo.url is required (baked in by the release pipeline)" .Values.chartRepo.url | quote }}
    chart: cert-config
    targetRevision: {{ .Values.chartRepo.certConfigRevision | quote }}
    helm:
      releaseName: cert-config
      values: |
        {{- toYaml $values | nindent 8 }}
  destination:
    name: {{ .Values.destination.name | quote }}
    namespace: {{ .Values.certManager.namespace | quote }}
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
