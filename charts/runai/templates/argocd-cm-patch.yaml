# Patches the argocd-cm ConfigMap to install a custom Application health check.
#
# By default ArgoCD marks a child Application as Healthy as soon as its own health
# check passes — it does NOT wait for the sync operation (and any Sync hooks) to
# complete first. This means a wave-N application can be started while wave-(N-1)
# applications are still running their hooks, violating the intended ordering.
#
# The Lua script below keeps the health status at "Progressing" whenever an
# operation is actively Running or Terminating, so ArgoCD genuinely waits for
# the full sync cycle to finish before advancing to the next wave.
#
# Wave 0 — must apply before any child Application resources (waves 1-3) exist.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.operationState ~= nil then
        local phase = obj.status.operationState.phase
        if phase == "Running" or phase == "Terminating" then
          hs.status = "Progressing"
          hs.message = "Sync operation in progress"
          return hs
        end
      end
      if obj.status.sync ~= nil and obj.status.sync.status ~= "Synced" then
        hs.status = "Progressing"
        hs.message = "Waiting for sync: " .. (obj.status.sync.status or "Unknown")
        return hs
      end
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        hs.message = obj.status.health.message or ""
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for initial status"
    return hs
