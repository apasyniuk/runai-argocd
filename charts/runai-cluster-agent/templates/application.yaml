apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}
      restartPolicy: OnFailure
      containers:
      - name: apply
        image: {{ .Values.image | quote }}
        env:
        - name: ARGOCD_NAMESPACE
          value: {{ .Values.argocd.namespace | quote }}
        - name: APP_NAME
          value: {{ .Values.appName | quote }}
        - name: CREDENTIALS_NAMESPACE
          value: {{ .Values.runai.namespace | quote }}
        - name: PROJECT
          value: {{ .Values.project | quote }}
        - name: DESTINATION
          value: {{ .Values.destination.name | quote }}
        - name: DOMAIN
          value: {{ .Values.domain | quote }}
        - name: RUNAI_VERSION
          value: {{ .Values.runai.version | quote }}
        - name: RUNAI_NAMESPACE
          value: {{ .Values.runai.namespace | quote }}
        - name: CUSTOM_CA_ENABLED
          value: {{ or .Values.customCAName .Values.selfSignedCA | quote }}
        - name: CUSTOM_CA_SECRET
          value: {{ if .Values.customCAName }}{{ .Values.customCAName | quote }}{{ else }}{{ .Values.caBundleName | quote }}{{ end }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          CLUSTER_UID=$(kubectl get secret runai-cluster-credentials \
            -n "${CREDENTIALS_NAMESPACE}" \
            -o jsonpath='{.data.clusterUID}' | base64 -d)

          TRACKING_ID="${APP_NAME}:argoproj.io/Application:${ARGOCD_NAMESPACE}/runai-cluster"

          jq -n \
            --arg ns         "$ARGOCD_NAMESPACE" \
            --arg appName    "$APP_NAME" \
            --arg trackingId "$TRACKING_ID" \
            --arg project    "$PROJECT" \
            --arg dest       "$DESTINATION" \
            --arg domain     "$DOMAIN" \
            --arg version    "$RUNAI_VERSION" \
            --arg rns        "$RUNAI_NAMESPACE" \
            --arg uid        "$CLUSTER_UID" \
            --argjson caEnabled "$CUSTOM_CA_ENABLED" \
            --arg caSecret   "$CUSTOM_CA_SECRET" \
            '{
              apiVersion: "argoproj.io/v1alpha1",
              kind: "Application",
              metadata: {
                name: "runai-cluster",
                namespace: $ns,
                labels: {"app.kubernetes.io/instance": $appName},
                annotations: {"argocd.argoproj.io/tracking-id": $trackingId},
                finalizers: ["resources-finalizer.argocd.argoproj.io"]
              },
              spec: {
                project: $project,
                source: {
                  repoURL: "https://runai.jfrog.io/artifactory/api/helm/run-ai-charts",
                  chart: "runai-cluster",
                  targetRevision: $version,
                  helm: {
                    releaseName: "runai-cluster",
                    values: (
                      "controlPlane:\n" +
                      "  url: \"https://" + $domain + "\"\n" +
                      "  existingSecret: runai-cluster-credentials\n" +
                      "  secretKeys:\n" +
                      "    clientSecret: client-secret\n" +
                      "cluster:\n" +
                      "  uid: " + ($uid | @json) + "\n" +
                      "  url: \"https://" + $domain + "\"\n" +
                      "global:\n" +
                      "  subdomainSupport: true\n" +
                      "  imagePullSecrets:\n" +
                      "    - name: runai-reg-creds\n" +
                      if $caEnabled then
                        "  customCA:\n" +
                        "    enabled: true\n" +
                        "    secret:\n" +
                        "      name: " + ($caSecret | @json) + "\n"
                      else "" end +
                      "gpu-operator:\n" +
                      "  enabled: false\n"
                    )
                  }
                },
                destination: {name: $dest, namespace: $rns},
                syncPolicy: {
                  automated: {selfHeal: true},
                  syncOptions: ["CreateNamespace=true", "ServerSideApply=true"]
                }
              }
            }' | kubectl apply -f -

          echo "runai-cluster Application applied with uid=${CLUSTER_UID}."
