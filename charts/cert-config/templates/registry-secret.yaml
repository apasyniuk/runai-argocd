{{- if .Values.registryToken }}
{{- $auth := printf "self-hosted-image-puller-prod:%s" .Values.registryToken | b64enc }}
{{- $dockerconfig := dict "auths" (dict "https://runai.jfrog.io" (dict "username" "self-hosted-image-puller-prod" "password" .Values.registryToken "email" "support@run.ai" "auth" $auth)) }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.runai.namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: runai-reg-creds
  namespace: {{ .Values.runai.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerconfig | toJson | b64enc }}
{{- end }}
