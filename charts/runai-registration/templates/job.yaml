{{- $hasCA := ne .Values.caSecretName "" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}
      restartPolicy: OnFailure
      {{- if $hasCA }}
      volumes:
      - name: ca-cert
        secret:
          secretName: {{ .Values.caSecretName }}
      {{- end }}
      containers:
      - name: register
        image: {{ .Values.image | quote }}
        {{- if $hasCA }}
        volumeMounts:
        - name: ca-cert
          mountPath: /etc/ssl/ca
          readOnly: true
        {{- end }}
        env:
        - name: CP_URL
          value: {{ .Values.cpURL | quote }}
        - name: ADMIN_USERNAME
          value: {{ .Values.adminUsername | quote }}
        - name: ADMIN_PASSWORD
          value: {{ .Values.adminPassword | quote }}
        - name: CLUSTER_NAME
          value: {{ .Values.clusterName | quote }}
        - name: CLUSTER_URL
          value: {{ .Values.clusterURL | quote }}
        - name: AGENT_VERSION
          value: {{ .Values.agentVersion | quote }}
        - name: CREDENTIALS_NAMESPACE
          value: {{ .Values.credentialsNamespace | quote }}
        {{- if $hasCA }}
        - name: CURL_CA_BUNDLE
          value: /etc/ssl/ca/{{ .Values.caKey }}
        {{- end }}
        command: ["/bin/sh", "-ec"]
        args:
        - |
          echo "Waiting for Run:ai CP at ${CP_URL}..."
          tries=0
          until curl -sf --max-time 5 \
              "${CP_URL}/auth/realms/runai/.well-known/openid-configuration" >/dev/null 2>&1; do
            tries=$((tries+1))
            [ "$tries" -ge 60 ] && echo "CP not ready after 600s" >&2 && exit 1
            echo "  attempt ${tries}/60, retrying in 10s..."
            sleep 10
          done

          TOKEN=$(curl -sf -X POST "${CP_URL}/api/v1/token" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg u "$ADMIN_USERNAME" --arg p "$ADMIN_PASSWORD" \
              '{"grantType":"password","username":$u,"password":$p}')" \
            | jq -r '.accessToken')

          CLUSTER_UUID=$(curl -sf -H "Authorization: Bearer ${TOKEN}" \
            "${CP_URL}/api/v1/clusters" \
            | jq -r --arg n "$CLUSTER_NAME" '.[] | select(.name == $n) | .uuid' | head -1)

          if [ -z "$CLUSTER_UUID" ]; then
            echo "Registering cluster '${CLUSTER_NAME}'..."
            CLUSTER_UUID=$(curl -sf -X POST "${CP_URL}/api/v1/clusters" \
              -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" \
              -d "$(jq -nc --arg n "$CLUSTER_NAME" --arg d "$CLUSTER_URL" \
                '{"name":$n,"domain":$d}')" \
              | jq -r '.uuid')
          else
            echo "Cluster '${CLUSTER_NAME}' already registered."
          fi

          CLIENT_SECRET=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            "${CP_URL}/api/v1/clusters/${CLUSTER_UUID}/cluster-install-info?version=${AGENT_VERSION}" \
            | jq -r '.clientSecret')

          kubectl create secret generic runai-cluster-credentials \
            --namespace="${CREDENTIALS_NAMESPACE}" \
            --from-literal=clusterUID="${CLUSTER_UUID}" \
            --from-literal=clientSecret="${CLIENT_SECRET}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Done. Credentials written to secret runai-cluster-credentials in ${CREDENTIALS_NAMESPACE}."
