{{- $creds := lookup "v1" "Secret" .Values.runai.namespace .Values.credentialsSecret }}
{{- if not $creds }}
  {{- fail (printf "Secret %s/%s not found — run the Run:ai Control Plane template with agentCluster.enabled first" .Values.runai.namespace .Values.credentialsSecret) }}
{{- end }}
{{- $uid := index $creds.data "clusterUID" | b64dec }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: runai-cluster
  namespace: {{ .Values.argocd.namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  source:
    repoURL: "https://runai.jfrog.io/artifactory/api/helm/run-ai-charts"
    chart: runai-cluster
    targetRevision: {{ .Values.runai.version | quote }}
    helm:
      releaseName: runai-cluster
      values: |
        controlPlane:
          url: "https://{{ .Values.domain }}"
          existingSecret: runai-cluster-credentials
          secretKeys:
            clientSecret: client-secret
        cluster:
          uid: {{ $uid | quote }}
          url: "https://{{ .Values.domain }}"
        global:
          subdomainSupport: true
          imagePullSecrets:
            - name: runai-reg-creds
          {{- if or .Values.customCAName .Values.selfSignedCA }}
          customCA:
            enabled: true
            secret:
              name: {{ if .Values.customCAName }}{{ .Values.customCAName | quote }}{{ else }}{{ .Values.caBundleName | quote }}{{ end }}
          {{- end }}
        gpu-operator:
          enabled: false
  destination:
    name: {{ .Values.destination.name | quote }}
    namespace: {{ .Values.runai.namespace }}
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
