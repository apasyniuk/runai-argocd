---
# Bootstrap issuer — only used to sign the intermediate CA.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: runai-selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Intermediate CA — isCA: true so it can itself sign certificates.
# Private key stays in the cert-manager namespace and is never distributed.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: runai-intermediate-ca
  namespace: {{ .Values.certManager.namespace }}
spec:
  isCA: true
  commonName: runai-intermediate-ca
  secretName: runai-intermediate-ca
  duration: 87600h   # 10 years
  renewBefore: 720h  # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: runai-selfsigned-bootstrap
    kind: ClusterIssuer
---
# CA issuer backed by the intermediate CA Secret.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: runai-ca-issuer
spec:
  ca:
    secretName: runai-intermediate-ca
---
# Wildcard TLS certificate for Run:ai, signed by the intermediate CA.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: runai-tls
  namespace: {{ .Values.runai.namespace }}
spec:
  secretName: runai-backend-tls
  issuerRef:
    name: runai-ca-issuer
    kind: ClusterIssuer
  commonName: {{ .Values.domain | quote }}
  dnsNames:
    - {{ .Values.domain | quote }}
    - {{ printf "*.%s" .Values.domain | quote }}
  duration: 8760h   # 1 year
  renewBefore: 360h # 15 days before expiry
---
# trust-manager Bundle — distributes only tls.crt (no private key) from the intermediate
# CA Secret into the runai namespace so Run:ai can trust its own TLS certificate.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: {{ .Values.caBundleName }}
spec:
  sources:
    - secret:
        name: runai-intermediate-ca
        key: tls.crt
  target:
    secret:
      key: runai-ca.pem
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Values.runai.namespace | quote }}
